backend:
  name: github
  repo: wrathishere/rpg-shop
  branch: main
  base_url: https://wrathfriends.netlify.app
  auth_endpoint: auth

media_folder: "images"
public_folder: "images"

collections:
  - name: "items"
    label: "Shop Items"
    label_singular: "Item"
    folder: "_data/items"
    create: true
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}} — 💰 {{price}} — Lv.{{level}} — {{category}}"
    format: "json"
    fields:
      - label: "Item Name"
        name: "name"
        widget: "string"

      - label: "Price"
        name: "price"
        widget: "number"
        value_type: "int"
        min: 0

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "⚔️ Weapon", value: "weapon" }
          - { label: "🛡️ Armor", value: "armor" }
          - { label: "🧪 Potion", value: "potion" }
          - { label: "💍 Accessory", value: "accessory" }
          - { label: "📜 Scroll", value: "scroll" }
          - { label: "🎁 Other", value: "other" }

      - label: "Level"
        name: "level"
        widget: "number"
        value_type: "int"
        min: 1
        default: 1

      - label: "On Sale"
        name: "sale"
        widget: "boolean"
        default: false

      - label: "Item Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Description"
        name: "description"
        widget: "text"
        required: false

backend:
  name: git-gateway
  branch: main
media_folder: "images"
public_folder: "images"

collections:
  - name: "items"
    label: "Shop Items"
    label_singular: "Item"
    folder: "_data/items"
    create: true
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}} — 💰 {{price}} — {{saleType}} — {{category}}"
    format: "json"
    fields:
      - label: "Item Name"
        name: "name"
        widget: "string"

      - label: "Price"
        name: "price"
        widget: "number"
        value_type: "int"
        min: 0

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "⚔️ Weapon", value: "weapon" }
          - { label: "🛡️ Armor", value: "armor" }
          - { label: "🧪 Potion", value: "potion" }
          - { label: "💍 Accessory", value: "accessory" }
          - { label: "📜 Scroll", value: "scroll" }
          - { label: "🎁 Other", value: "other" }

      - label: "Sale Type"
        name: "saleType"
        widget: "select"
        default: "Per Item"
        options:
          - "Per Item"
          - "Per Stack"
          - "Per Set"
          - "Bundle"
          - "Pair"
          - "Crate"
          - "Pack"
          - "Per KG"
          - "Per Roll"

      - label: "Custom Sale Type (optional override)"
        name: "saleTypeCustom"
        widget: "string"
        required: false
        hint: "If provided, this custom text overrides the dropdown sale type."

      - label: "On Sale"
        name: "sale"
        widget: "boolean"
        default: false

      - label: "Item Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Description"
        name: "description"
        widget: "text"
        required: false

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrath & Friends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260530-premium-cards-2" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="shop-brand">
        <img src="images/logo.png" alt="Wrath and Friends" class="brand-icon" onerror="this.style.display='none'" />
        <div>
          <h1 class="shop-title">Wrath &amp; Friends</h1>
          <p class="shop-tagline" id="shop-tagline">For Friends by the friends</p>
        </div>
      </div>
      <div class="player-report-controls">
        <select id="player-select" class="player-select" aria-label="Select player">
          <option value="">Select player...</option>
        </select>
        <button id="player-report-btn" class="player-report-btn">Open Report</button>
        <button id="clear-smart-sort-btn" class="player-report-btn hidden" type="button">Clear Smart Sort</button>
      </div>
    </div>
  </header>

  <!-- Search & Filter Bar -->
  <nav class="filter-bar" role="navigation" aria-label="Shop filters">
    <div class="filter-inner">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search items…"
          aria-label="Search items"
        />
      </div>
      <div class="category-pills" role="group" aria-label="Filter by category">
        <button class="pill active" data-category="all">All Items</button>
      </div>
    </div>
  </nav>

  <!-- Spreadsheet-driven shop menu links -->
  <div class="shop-menu-links" id="shop-menu-links" aria-label="Shop menu links"></div>

  <!-- Results count -->
  <div class="results-info" aria-live="polite">
    <span id="item-count">0 items</span> available in the shop
  </div>

  <!-- Item Grid -->
  <div class="shop-layout">
    <aside class="tag-sidebar" id="tag-sidebar" aria-label="Tag filters"></aside>
    <main class="shop-grid" id="shop-grid" aria-label="Shop items"></main>
  </div>

  <!-- Empty state -->
  <div class="empty-state hidden" id="empty-state">
    <span class="empty-icon">🗺️</span>
    <p>No items found. Try a different search or category.</p>
  </div>

  <!-- Item Detail Modal -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-card">
      <button class="modal-close" id="modal-close" aria-label="Close item detail">✕</button>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>


  <div class="report-backdrop" id="report-backdrop" hidden>
    <div class="report-modal">
      <button id="report-close" class="modal-close" aria-label="Close report">✕</button>
      <div id="report-content"></div>
    </div>
  </div>
  <script>window.SHOP_INVENTORY_SHEET_CSV = "https://docs.google.com/spreadsheets/d/1RoFJQlR974Ut8XNJkFqYKdo9lbsbYa3BbtFxWDvVZ4c/gviz/tq?tqx=out:csv&sheet=main_data";</script>
  <script>window.SHOP_SETTINGS_SHEET_CSV = "https://docs.google.com/spreadsheets/d/1RoFJQlR974Ut8XNJkFqYKdo9lbsbYa3BbtFxWDvVZ4c/gviz/tq?tqx=out:csv&sheet=settings";</script>
  <script>window.PLAYER_SHEET_CSV = "https://docs.google.com/spreadsheets/d/1Z09iAqbN-d0h7Jm4LCGG2BDoEJY-ZWZwyFFf6QrQloQ/gviz/tq?tqx=out:csv&sheet=Sheet3";</script>
  <script>window.WEAPON_PAGE_URL = "https://wrathishere.github.io/wrathandfriends/checkweaponstat/";</script>
  <script src="js/items.js?v=20260530-premium-cards-2"></script>
  <script src="js/shop.js?v=20260530-smart-sort-filter"></script>
</body>
</html>

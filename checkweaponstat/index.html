<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weapon Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Compatibility Layer for the Glowing Availability Indicators */
    .thumb-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      flex-shrink: 0;
    }
    .availability-badge {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
      text-align: center;
      display: inline-block;
    }
    .availability-badge.available {
      color: #2ecc71;
      text-shadow: 0 0 6px rgba(46, 204, 113, 0.8);
    }
    .availability-badge.unavailable {
      color: #e74c3c;
      text-shadow: 0 0 6px rgba(231, 76, 60, 0.8);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="title">Armory Archive</h1>
    <p class="subtitle">Weapons of Wrath &amp; Friends</p>

    <section class="toolbar" aria-label="Filters">
      <input id="search" class="input" placeholder="Search weapon name..." />
      <select id="typeFilter" class="select"><option value="all">All Types</option></select>
    </section>

    <section id="grid" class="grid" aria-live="polite">
      <div class="loading-state">Loading armory data…</div>
    </section>
  </main>

  <script src="items.js"></script>
  <script>
    let weapons = [];
    const grid       = document.getElementById('grid');
    const search     = document.getElementById('search');
    const typeFilter = document.getElementById('typeFilter');

    // Stat value at a given weapon level
    // Level 1 = base; each level after adds the increase
    function atLevel(base, inc, level) {
      return Math.round(base + inc * (level - 1));
    }

    // Build the stats block HTML dynamically (Safe Version)
    function statsHtml(w, level) {
      let html = '';

      // Safe lookup utility that handles spacing, casing, underscores,
      // and common Google Sheet column truncations (like "increa" instead of "increase")
      const getStat = (key) => {
        const normTarget = key.toLowerCase().replace(/[\s_-]+/g, '');
        
        const searchIn = (obj) => {
          if (!obj) return undefined;
          
          // 1. Exact normalized match
          for (const [k, val] of Object.entries(obj)) {
            const normK = k.toLowerCase().replace(/[\s_-]+/g, '');
            if (normK === normTarget) return val;
          }

          // 2. Fuzzy match to resolve column truncation (e.g. "durability_increa" matching "durability_increase")
          if (normTarget.endsWith('increase')) {
            const baseStat = normTarget.replace('increase', ''); // e.g., "durability"
            for (const [k, val] of Object.entries(obj)) {
              const normK = k.toLowerCase().replace(/[\s_-]+/g, '');
              if (normK.startsWith(baseStat) && (normK.endsWith('increa') || normK.endsWith('incre') || normK.endsWith('inc'))) {
                return val;
              }
            }
          }
          return undefined;
        };

        const res = searchIn(w.stats);
        if (res !== undefined) return res;
        return searchIn(w);
      };

      // Configuration of possible stats to look for (Quantity stats have been removed completely)
      const STATS_TO_RENDER = [
        { label: 'Slash',            base: 'slash_base',            inc: 'slash_increase' },
        { label: 'Blunt',            base: 'blunt_base',            inc: 'blunt_increase' },
        { label: 'Pierce',           base: 'pierce_base',           inc: 'pierce_increase' },
        { label: 'Frost',            base: 'frost_base',            inc: 'frost_increase' },
        { label: 'Fire',             base: 'fire_base',             inc: 'fire_increase' },
        { label: 'Lightning',        base: 'lightning_base',        inc: 'lightning_increase' },
        { label: 'Poison',           base: 'poison_base',           inc: 'poison_increase' },
        { label: 'Spirit',           base: 'spirit_base',           inc: 'spirit_increase' },
        { label: 'Chop',             base: 'chop_base',             inc: 'chop_increase' },
        { label: 'Pickaxe',          base: 'pickaxe_base',          inc: 'pickaxe_increase' },
        { label: 'Stagger',          base: 'stagger_base',          inc: 'stagger_increase' },
        { label: 'Block Armor',      base: 'block_armor_base',      inc: 'block_armor_increase' },
        { label: 'Block Force',      base: 'block_force_base',      inc: 'block_force_increase' },
        { label: 'Knockback',        base: 'knockback_base',        inc: 'knockback_increase' },
        { label: 'Shield Duration',  base: 'shield_duration_base',  inc: 'shield_duration_increase' },
        { label: 'Summons',          base: 'summons_base',          inc: 'summons_increase' },
        { label: 'Durability',       base: 'durability_base',       inc: 'durability_increase' },
        
        // Single values (non-scaling)
        { label: 'Stamina Use',      base: 'use_stamina' },
        { label: 'Stamina Use',      base: 'stamina' },
        { label: 'Eitr Use',         base: 'use_eitr' },
        { label: 'Eitr Use',         base: 'eitr' },
        { label: 'Parry Bonus',      base: 'parry_bonus' }
      ];

      const renderedLabels = new Set();

      STATS_TO_RENDER.forEach(cfg => {
        if (renderedLabels.has(cfg.label)) return;

        const rawBase = getStat(cfg.base);
        if (rawBase === undefined || rawBase === null || rawBase === '') return;

        const baseNum = parseFloat(rawBase);
        const incNum  = cfg.inc ? (parseFloat(getStat(cfg.inc)) || 0) : 0;

        // Skip stat output if numeric base is 0 or less, and no upgrade scaling exists
        if (!isNaN(baseNum) && baseNum <= 0 && incNum <= 0) return;

        renderedLabels.add(cfg.label);

        let displayVal;
        if (isNaN(baseNum)) {
          displayVal = rawBase; // Output text directly
        } else if (incNum === 0) {
          displayVal = rawBase; // Prevent stripping non-numeric indicators (like "2x") on static entries
        } else {
          displayVal = atLevel(baseNum, incNum, level);
          if (typeof rawBase === 'string' && rawBase.endsWith('x')) {
            displayVal += 'x';
          }
        }
        
        html += `<div class="stat-row">
          <span class="stat-label-text">${cfg.label}</span>
          <span class="stat-value">${displayVal}</span>
        </div>`;
      });

      return html;
    }

    // Programmatically update weapon level via buttons
    window.setWeaponLevel = function(idx, lvl) {
      const slider = document.getElementById(`slider-${idx}`);
      const badge  = document.getElementById(`badge-${idx}`);
      const statsEl = document.getElementById(`stats-${idx}`);
      if (!slider || !badge || !statsEl) return;

      slider.value = lvl;
      badge.textContent = lvl;
      
      const w = weapons[idx];
      if (w) {
        statsEl.innerHTML = statsHtml(w, lvl);
      }

      // Keep button selected layout highlights matched
      const cardEl = slider.closest('.card');
      if (cardEl) {
        cardEl.querySelectorAll('.level-btn').forEach(btn => {
          if (parseInt(btn.textContent.trim(), 10) === lvl) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
      }
    };

    // Build a full card HTML string
    function cardHtml(w, idx) {
      // Level Slider is always set to 200
      const maxLevel = 200;
      
      const hasLevels = w.levels_available && w.levels_available.length > 0;
      const levelsHtml = hasLevels ? `
        <div class="level-buttons-container">
          <span class="level-buttons-label">Select Level to Preview:</span>
          <div class="level-buttons-list">
            ${w.levels_available.map(lvl => `
              <button type="button" class="level-btn" onclick="setWeaponLevel(${idx}, ${lvl})">
                ${lvl}
              </button>
            `).join('')}
          </div>
        </div>
      ` : '';

      // Check if image exists; display placeholder shield icon if empty
      const hasImage = !!w.image;
      const imgHtml = hasImage ? `
        <img
          src="${w.image}"
          alt="${w.name}"
          loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
        />
        <span class="no-img" style="display:none">⚔️</span>
      ` : `
        <span class="no-img">⚔️</span>
      `;

      // Determine glowing availability badges
      const isAvailable = w.quantity_available > 0;
      const availabilityHtml = isAvailable 
        ? `<span class="availability-badge available">Available</span>`
        : `<span class="availability-badge unavailable">Unavailable</span>`;

      return `<article class="card">
        <div class="card-top">
          <div class="card-name-block">
            <h2 class="name">${w.name}</h2>
            <p class="type">${w.type}</p>
            ${levelsHtml}
          </div>
          <div class="thumb-wrapper">
            <div class="thumb">
              <span class="level-badge-overlay" id="badge-${idx}">1</span>
              ${imgHtml}
            </div>
            ${availabilityHtml}
          </div>
        </div>

        <div class="card-body" id="stats-${idx}">
  ${statsHtml(w, 1)}
</div>

${w.description ? `<div class="card-description">${w.description}</div>` : ''}

        <div class="card-footer">
          <div class="slider-label">
            <span class="slider-label-text">Change Equipment Level</span>
          </div>
          <input
            type="range"
            class="level-slider"
            min="1" max="${maxLevel}" step="1" value="1"
            id="slider-${idx}"
          />
        </div>
      </article>`;
    }

    // Attach slider event listeners after cards are rendered
    function attachSliders() {
      weapons.forEach((w, idx) => {
        const slider  = document.getElementById(`slider-${idx}`);
        const badge   = document.getElementById(`badge-${idx}`);
        const statsEl = document.getElementById(`stats-${idx}`);
        if (!slider) return;

        const updateActiveButton = (lvl) => {
          const cardEl = slider.closest('.card');
          if (cardEl) {
            cardEl.querySelectorAll('.level-btn').forEach(btn => {
              if (parseInt(btn.textContent.trim(), 10) === lvl) {
                btn.classList.add('active');
              } else {
                btn.classList.remove('active');
              }
            });
          }
        };

        slider.addEventListener('input', () => {
          const lvl = parseInt(slider.value, 10);
          badge.textContent = lvl;
          statsEl.innerHTML = statsHtml(w, lvl);
          updateActiveButton(lvl);
        });

        updateActiveButton(1);
      });
    }

    function render() {
      const q = search.value.trim().toLowerCase();
      const t = typeFilter.value;
      const filtered = weapons.filter(w =>
        (t === 'all' || w.type === t) &&
        (!q || w.name.toLowerCase().includes(q))
      );

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty">No weapons match your search.</div>`;
        return;
      }

      grid.innerHTML = filtered
        .map(w => cardHtml(w, weapons.indexOf(w)))
        .join('');

      attachSliders();
    }

    function loadTypeFilter() {
      const types = [...new Set(weapons.map(w => w.type))].sort((a, b) => a.localeCompare(b));
      typeFilter.innerHTML =
        `<option value="all">All Types</option>` +
        types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    search.addEventListener('input', render);
    typeFilter.addEventListener('change', render);

    (async () => {
      try {
        weapons = await loadWeaponShowcase();
        loadTypeFilter();
        render();
      } catch (err) {
        console.error(err);
        grid.innerHTML = `<div class="error-state">
          ⚠️ Could not load weapon data.<br/>
          <small>Make sure SHEET_ID is set in items.js and the sheet is published publicly.</small><br/><br/>
          <small style="opacity:.5">${err.message}</small>
        </div>`;
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weapon Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1 class="title">Armory Archive</h1>
    <p class="subtitle">Weapons of Wrath &amp; Friends</p>

    <section class="toolbar" aria-label="Filters">
      <input id="search" class="input" placeholder="Search weapon name..." />
      <select id="typeFilter" class="select"><option value="all">All Types</option></select>
    </section>

    <section id="grid" class="grid" aria-live="polite">
      <div class="loading-state">Loading armory data…</div>
    </section>
  </main>

  <script src="items.js"></script>
  <script>
    let weapons = [];
    const grid       = document.getElementById('grid');
    const search     = document.getElementById('search');
    const typeFilter = document.getElementById('typeFilter');

    // Stat value at a given weapon level
    // Level 1 = base; each level after adds the increase
    function atLevel(base, inc, level) {
      return Math.round(base + inc * (level - 1));
    }

    // Build the stats block HTML dynamically (Safe Version)
    function statsHtml(w, level) {
      let html = '';

      // Helper function to safely fetch stats from either your old or new items.js structure
      const getStat = (key) => {
        if (w.stats && w.stats[key] !== undefined) return w.stats[key];
        return w[key];
      };

      // Configuration of possible stats to look for
      const STATS_TO_RENDER = [
        { label: 'Slash',       base: 'slash_base',       inc: 'slash_increase' },
        { label: 'Spirit',      base: 'spirit_base',      inc: 'spirit_increase' },
        { label: 'Frost',       base: 'frost_base',       inc: 'frost_increase' },
        { label: 'Fire',        base: 'fire_base',        inc: 'fire_increase' },
        { label: 'Lightning',   base: 'lightning_base',   inc: 'lightning_increase' },
        { label: 'Durability',  base: 'durability_base',  inc: 'durability_increase' },
        { label: 'Block',       base: 'block_base',       inc: 'block_increase' },
        { label: 'Armor',       base: 'armor_base',       inc: 'armor_increase' },
        { label: 'Stamina',     base: 'Stamina' },
        { label: 'Stamina',     base: 'stamina' },
        { label: 'Eitr',        base: 'eitr' },
        { label: 'Quantity',    base: 'Quantity Available' },
        { label: 'Quantity',    base: 'quantity' }
      ];

      const renderedLabels = new Set();

      STATS_TO_RENDER.forEach(cfg => {
        // Prevent duplicate rows for the same label
        if (renderedLabels.has(cfg.label)) return;

        const base = parseFloat(getStat(cfg.base)) || 0;
        const inc  = cfg.inc ? (parseFloat(getStat(cfg.inc)) || 0) : 0;

        // Skip if stat doesn't exist
        if (base <= 0 && inc <= 0) return;

        renderedLabels.add(cfg.label);
        const val = atLevel(base, inc, level);
        
        html += `<div class="stat-row">
          <span class="stat-label-text">${cfg.label}</span>
          <span class="stat-value">${val}</span>
        </div>`;
      });

      return html;
    }

    // Global function to programmatically update weapon level via buttons
    window.setWeaponLevel = function(idx, lvl) {
      const slider = document.getElementById(`slider-${idx}`);
      const badge  = document.getElementById(`badge-${idx}`);
      const statsEl = document.getElementById(`stats-${idx}`);
      if (!slider || !badge || !statsEl) return;

      slider.value = lvl;
      badge.textContent = lvl;
      
      const w = weapons[idx];
      if (w) {
        statsEl.innerHTML = statsHtml(w, lvl);
      }
    };

    // Build a full card HTML string
    function cardHtml(w, idx) {
      const maxLevel = 200;
      
      // Build button elements for each available level
      const hasLevels = w.levels_available && w.levels_available.length > 0;
      const levelsHtml = hasLevels ? `
        <div class="level-buttons-container">
          <span class="level-buttons-label">Available at levels:</span>
          <div class="level-buttons-list">
            ${w.levels_available.map(lvl => `
              <button type="button" class="level-btn" onclick="setWeaponLevel(${idx}, ${lvl})">
                ${lvl}
              </button>
            `).join('')}
          </div>
        </div>
      ` : '';

      return `<article class="card">
        <div class="card-top">
          <div class="card-name-block">
            <h2 class="name">${w.name}</h2>
            <p class="type">${w.type}</p>
            <!-- Relocated Level buttons -->
            ${levelsHtml}
          </div>
          <div class="thumb">
            <span class="level-badge-overlay" id="badge-${idx}">1</span>
            <img
              src="${w.image}"
              alt="${w.name}"
              loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
            />
            <span class="no-img" style="display:none">⚔️</span>
          </div>
        </div>

        <div class="card-body" id="stats-${idx}">
          ${statsHtml(w, 1)}
        </div>

        <div class="card-footer">
          <div class="slider-label">
            <span class="slider-label-text">Change Equipment Level</span>
          </div>
          <input
            type="range"
            class="level-slider"
            min="1" max="${maxLevel}" step="1" value="1"
            id="slider-${idx}"
          />
        </div>
      </article>`;
    }

    // Attach slider event listeners after cards are rendered
    function attachSliders() {
      weapons.forEach((w, idx) => {
        const slider  = document.getElementById(`slider-${idx}`);
        const badge   = document.getElementById(`badge-${idx}`);
        const statsEl = document.getElementById(`stats-${idx}`);
        if (!slider) return;
        slider.addEventListener('input', () => {
          const lvl = parseInt(slider.value, 10);
          badge.textContent = lvl;
          statsEl.innerHTML = statsHtml(w, lvl);
        });
      });
    }

    function render() {
      const q = search.value.trim().toLowerCase();
      const t = typeFilter.value;
      const filtered = weapons.filter(w =>
        (t === 'all' || w.type === t) &&
        (!q || w.name.toLowerCase().includes(q))
      );

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty">No weapons match your search.</div>`;
        return;
      }

      grid.innerHTML = filtered
        .map(w => cardHtml(w, weapons.indexOf(w)))
        .join('');

      attachSliders();
    }

    function loadTypeFilter() {
      const types = [...new Set(weapons.map(w => w.type))].sort((a, b) => a.localeCompare(b));
      typeFilter.innerHTML =
        `<option value="all">All Types</option>` +
        types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    search.addEventListener('input', render);
    typeFilter.addEventListener('change', render);

    (async () => {
      try {
        weapons = await loadWeaponShowcase();
        loadTypeFilter();
        render();
      } catch (err) {
        console.error(err);
        grid.innerHTML = `<div class="error-state">
          ⚠️ Could not load weapon data.<br/>
          <small>Make sure SHEET_ID is set in items.js and the sheet is published publicly.</small><br/><br/>
          <small style="opacity:.5">${err.message}</small>
        </div>`;
      }
    })();
  </script>
</body>
</html>

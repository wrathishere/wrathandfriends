<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weapon Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1 class="title">Armory Archive</h1>
    <p class="subtitle">Weapons of Wrath &amp; Friends</p>

    <section class="toolbar" aria-label="Filters">
      <input id="search" class="input" placeholder="Search weapon name..." />
      </section>

    <section id="grid" class="grid" aria-live="polite"></section>
    <div id="empty" class="empty" hidden>No weapons match your search.</div>
  </main>

  <script src="items.js"></script>
  <script>
    let weapons = [];
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const search = document.getElementById('search');

    function cardHtml(w) {
      const image = w.image ? `<img loading="lazy" src="${w.image}" alt="${w.name}" />` : '🗡️';
      return `<article class="card"><div class="thumb">${image}</div><div class="meta"><h2 class="name">${w.name}</h2><span class="lvl">Lv ${w.level}</span></div></article>`;
    }

    function render() {
      const q = search.value.trim().toLowerCase();
      const filtered = weapons.filter(w => !q || w.name.toLowerCase().includes(q));
      grid.innerHTML = filtered.map(cardHtml).join('');
      empty.hidden = filtered.length > 0;
    }

    search.addEventListener('input', render);

    (async () => {
      weapons = await loadWeaponShowcase();
      render();
    })();
  </script>
</body>
</html>
